name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode 15
      run: |
        # Use whatever Xcode 15.x is available on this runner
        XCODE=$(ls /Applications | grep "Xcode_15" | sort -V | tail -1)
        echo "Using: $XCODE"
        sudo xcode-select -s /Applications/$XCODE/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: List project info (debug)
      run: |
        echo "--- Files in repo root ---"
        ls -la
        echo "--- Schemes available ---"
        xcodebuild -project ManualCam.xcodeproj -list

    - name: Install xcpretty
      run: gem install xcpretty --no-document 2>/dev/null || true

    # Build unsigned .app — show full log on failure
    - name: Build unsigned .app
      run: |
        set -o pipefail
        xcodebuild build \
          -project ManualCam.xcodeproj \
          -scheme ManualCam \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath $RUNNER_TEMP/DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          ENABLE_BITCODE=NO \
          2>&1 | tee $RUNNER_TEMP/build.log | xcpretty
        EXIT=${PIPESTATUS[0]}
        if [ $EXIT -ne 0 ]; then
          echo "❌ Build failed — last 100 lines of raw log:"
          tail -100 $RUNNER_TEMP/build.log
          exit $EXIT
        fi

    # Package the .app into an unsigned .ipa
    - name: Package into unsigned IPA
      run: |
        set -e
        APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "ManualCam.app" -type d | head -1)

        if [ -z "$APP_PATH" ]; then
          echo "❌ ERROR: ManualCam.app not found — build likely failed"
          exit 1
        fi

        echo "✅ Found app at: $APP_PATH"
        mkdir -p $RUNNER_TEMP/Payload
        cp -r "$APP_PATH" $RUNNER_TEMP/Payload/ManualCam.app

        cd $RUNNER_TEMP
        zip -r ManualCam-unsigned.ipa Payload/
        echo "✅ IPA created: $(du -sh ManualCam-unsigned.ipa)"

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: ManualCam-Unsigned-IPA
        path: ${{ runner.temp }}/ManualCam-unsigned.ipa
        retention-days: 30
