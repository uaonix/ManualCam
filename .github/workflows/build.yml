name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode 15
      run: |
        XCODE=$(ls /Applications | grep "Xcode_15" | sort -V | tail -1)
        echo "Using: $XCODE"
        sudo xcode-select -s /Applications/$XCODE/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Install xcpretty
      run: gem install xcpretty --no-document 2>/dev/null || true

    - name: Build unsigned .app
      run: |
        set -o pipefail
        xcodebuild build \
          -project ManualCam.xcodeproj \
          -scheme ManualCam \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath $RUNNER_TEMP/DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          ENABLE_BITCODE=NO \
          2>&1 | tee $RUNNER_TEMP/build.log | xcpretty
        EXIT=${PIPESTATUS[0]}
        if [ $EXIT -ne 0 ]; then
          echo "❌ Build failed — last 100 lines:"
          tail -100 $RUNNER_TEMP/build.log
          exit $EXIT
        fi

    - name: Package and ad-hoc sign IPA
      run: |
        set -e

        APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "ManualCam.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "❌ ManualCam.app not found"
          exit 1
        fi
        echo "✅ Found: $APP_PATH"

        # Copy app into Payload/
        WORK_DIR=$RUNNER_TEMP/ipa_work
        rm -rf "$WORK_DIR"
        mkdir -p "$WORK_DIR/Payload"
        cp -r "$APP_PATH" "$WORK_DIR/Payload/ManualCam.app"
        APP="$WORK_DIR/Payload/ManualCam.app"

        # Create minimal entitlements
        cat > $RUNNER_TEMP/entitlements.plist << 'ENTEOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>application-identifier</key>
    <string>ALTTEAM.com.manualcam.app</string>
    <key>com.apple.developer.team-identifier</key>
    <string>ALTTEAM</string>
    <key>get-task-allow</key>
    <true/>
</dict>
</plist>
ENTEOF

        # Sign with ad-hoc identity "-"
        # "-" means local ad-hoc signature — no certificate needed
        # AltStore/Sideloadly will replace this with your Apple ID signature

        # Sign any embedded frameworks first
        if [ -d "$APP/Frameworks" ]; then
          find "$APP/Frameworks" -name "*.framework" -o -name "*.dylib" | while read fw; do
            codesign --force --sign "-" --timestamp=none "$fw" 2>/dev/null || true
          done
        fi

        # Sign the main bundle
        codesign \
          --force \
          --sign "-" \
          --entitlements $RUNNER_TEMP/entitlements.plist \
          --timestamp=none \
          --generate-entitlement-der \
          "$APP"

        echo "✅ Ad-hoc signature applied"
        codesign -dv "$APP" 2>&1

        # Package into IPA — must cd into WORK_DIR so paths are relative
        cd "$WORK_DIR"
        zip -r "$RUNNER_TEMP/ManualCam-unsigned.ipa" Payload

        echo "✅ IPA size: $(du -sh $RUNNER_TEMP/ManualCam-unsigned.ipa)"
        echo "--- IPA structure ---"
        unzip -l "$RUNNER_TEMP/ManualCam-unsigned.ipa" | head -10

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ManualCam-Unsigned-IPA
        path: ${{ runner.temp }}/ManualCam-unsigned.ipa
        retention-days: 30
