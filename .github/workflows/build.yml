name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode 15
      run: |
        XCODE=$(ls /Applications | grep "Xcode_15" | sort -V | tail -1)
        echo "Using: $XCODE"
        sudo xcode-select -s /Applications/$XCODE/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: List project info (debug)
      run: |
        echo "--- Files in repo root ---"
        ls -la
        echo "--- Schemes available ---"
        xcodebuild -project ManualCam.xcodeproj -list

    - name: Install xcpretty
      run: gem install xcpretty --no-document 2>/dev/null || true

    - name: Build unsigned .app
      run: |
        set -o pipefail
        xcodebuild build \
          -project ManualCam.xcodeproj \
          -scheme ManualCam \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath $RUNNER_TEMP/DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          ENABLE_BITCODE=NO \
          2>&1 | tee $RUNNER_TEMP/build.log | xcpretty
        EXIT=${PIPESTATUS[0]}
        if [ $EXIT -ne 0 ]; then
          echo "❌ Build failed — last 100 lines of raw log:"
          tail -100 $RUNNER_TEMP/build.log
          exit $EXIT
        fi

    - name: Package into unsigned IPA
      run: |
        set -e

        # Find the built .app
        APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "ManualCam.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "❌ ManualCam.app not found"
          exit 1
        fi
        echo "✅ Found: $APP_PATH"

        # Create a clean Payload directory
        WORK_DIR=$RUNNER_TEMP/ipa_work
        rm -rf "$WORK_DIR"
        mkdir -p "$WORK_DIR/Payload"
        cp -r "$APP_PATH" "$WORK_DIR/Payload/ManualCam.app"

        # IMPORTANT: cd into WORK_DIR before zipping
        # so the zip contains Payload/ManualCam.app at its root
        # NOT /private/var/folders/.../Payload/ManualCam.app
        cd "$WORK_DIR"
        zip -r "$RUNNER_TEMP/ManualCam-unsigned.ipa" Payload

        echo "✅ IPA size: $(du -sh $RUNNER_TEMP/ManualCam-unsigned.ipa)"
        echo "--- Verifying IPA structure ---"
        unzip -l "$RUNNER_TEMP/ManualCam-unsigned.ipa" | head -15

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: ManualCam-Unsigned-IPA
        path: ${{ runner.temp }}/ManualCam-unsigned.ipa
        retention-days: 30
