name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode 15
      run: |
        XCODE=$(ls /Applications | grep "Xcode_15" | sort -V | tail -1)
        echo "Using: $XCODE"
        sudo xcode-select -s /Applications/$XCODE/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Install xcpretty
      run: gem install xcpretty --no-document 2>/dev/null || true

    - name: Build archive
      run: |
        set -o pipefail
        xcodebuild archive \
          -project ManualCam.xcodeproj \
          -scheme ManualCam \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $RUNNER_TEMP/ManualCam.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          ENABLE_BITCODE=NO \
          SKIP_INSTALL=NO \
          2>&1 | tee $RUNNER_TEMP/build.log | xcpretty
        EXIT=${PIPESTATUS[0]}
        if [ $EXIT -ne 0 ]; then
          echo "❌ Build failed:"
          tail -100 $RUNNER_TEMP/build.log
          exit $EXIT
        fi

    - name: Verify and fix Info.plist inside .app
      run: |
        set -e
        APP_PATH=$(find $RUNNER_TEMP/ManualCam.xcarchive -name "ManualCam.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "❌ ManualCam.app not found in archive"
          find $RUNNER_TEMP/ManualCam.xcarchive -type d | head -20
          exit 1
        fi

        echo "✅ App found: $APP_PATH"
        PLIST="$APP_PATH/Info.plist"

        echo "--- Info.plist contents ---"
        plutil -p "$PLIST" || echo "⚠️ Could not read Info.plist"

        # Check CFBundleIdentifier exists
        BUNDLE_ID=$(plutil -extract CFBundleIdentifier raw "$PLIST" 2>/dev/null || echo "")
        echo "Bundle ID found: '$BUNDLE_ID'"

        if [ -z "$BUNDLE_ID" ] || [ "$BUNDLE_ID" = "" ]; then
          echo "⚠️ CFBundleIdentifier missing — injecting it"
          plutil -insert CFBundleIdentifier -string "com.manualcam.app" "$PLIST"
        fi

        # Also ensure CFBundleExecutable is set
        EXEC=$(plutil -extract CFBundleExecutable raw "$PLIST" 2>/dev/null || echo "")
        echo "Bundle Executable: '$EXEC'"
        if [ -z "$EXEC" ]; then
          echo "⚠️ CFBundleExecutable missing — injecting it"
          plutil -insert CFBundleExecutable -string "ManualCam" "$PLIST"
        fi

        # Verify binary exists
        echo "--- App bundle contents ---"
        ls -la "$APP_PATH"

        # Verify the binary is there
        if [ ! -f "$APP_PATH/ManualCam" ]; then
          echo "❌ Binary ManualCam not found inside .app"
          exit 1
        fi
        echo "✅ Binary found"

    - name: Package IPA
      run: |
        set -e
        APP_PATH=$(find $RUNNER_TEMP/ManualCam.xcarchive -name "ManualCam.app" -type d | head -1)

        # Ad-hoc sign so the bundle has a valid signature structure
        codesign --force --deep --sign - "$APP_PATH" 2>/dev/null || true

        # Package into IPA — cd into work dir so Payload/ is at zip root
        WORK_DIR=$RUNNER_TEMP/ipa_work
        rm -rf "$WORK_DIR"
        mkdir -p "$WORK_DIR/Payload"
        cp -r "$APP_PATH" "$WORK_DIR/Payload/ManualCam.app"

        cd "$WORK_DIR"
        zip -qr "$RUNNER_TEMP/ManualCam-unsigned.ipa" Payload

        echo "✅ IPA: $(du -sh $RUNNER_TEMP/ManualCam-unsigned.ipa)"
        echo "--- IPA structure ---"
        unzip -l "$RUNNER_TEMP/ManualCam-unsigned.ipa" | grep -E "(Payload/$|ManualCam$|Info.plist)" | head -10

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ManualCam-Unsigned-IPA
        path: ${{ runner.temp }}/ManualCam-unsigned.ipa
        retention-days: 30
